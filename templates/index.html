<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ title }}</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
max-width:500px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

select,input,button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#1f4ed8;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1637a3;
}

.historie{
margin-top:25px;
font-size:14px;
}

.error{
color:red;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="card">

<h2>Voorraadtellen</h2>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form action="/upload" method="post">

<label>Vestiging</label>

<select name="vestiging">

<option value="Leeuwarden">Leeuwarden</option>
<option value="Sneek">Sneek</option>
<option value="Drachten">Drachten</option>

</select>


<label>Aantal artikelen</label>

<input type="number" name="aantal" value="25">


<button type="submit">
Start telling
</button>

</form>


<div class="historie">

<b>Historie geteld:</b>

<ul>
<li>Leeuwarden: {{ historie.get("Leeuwarden",0) if historie else 0 }}</li>
<li>Sneek: {{ historie.get("Sneek",0) if historie else 0 }}</li>
<li>Drachten: {{ historie.get("Drachten",0) if historie else 0 }}</li>

</ul>

</div>

</div>

</body>
</html>
